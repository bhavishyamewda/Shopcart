<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | ShopKart Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="Assets/css/style.css">
    <link rel="stylesheet" href="Assets/css/responsive.css">
</head>
<body>
    <header class="main-header py-3 sticky">
        <div class="container d-between">
            <a href="index.html" class="navbar-brand text-decoration-none text-primary d-flex align-items-center">
                <i class="fas fa-shopping-bag fa-2x me-2 text-warning"></i>
                <h3 class="m-0 fw-bold">ShopKart <span class="text-warning">Pro</span></h3>
            </a>
            <div class="d-flex align-items-center gap-3">
                <input id="global-search-input" type="text" class="form-control form-control-sm" placeholder="Live filtering core data..." style="max-width:200px;">
                <a href="cart.html" class="text-dark position-relative"><i class="fas fa-shopping-cart fa-lg"></i><span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark cart-count">0</span></a>
            </div>
        </div>
    </header>

    <div class="container my-5">
        <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Products Grid</li></ol></nav>
        <h2 class="fw-bold mb-4">Complete Premium Inventory</h2>
        <div class="row g-4" id="products-showcase-grid"></div>
    </div>

    <script src="Assets/js/products.js"></script>
    <script src="Assets/js/cart.js"></script>
    <script src="Assets/js/main.js"></script>
</body>
</html>
