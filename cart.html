<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | ShopKart Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="Assets/css/style.css">
</head>
<body>
<header class="main-header py-3">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-6 col-md-4">
                    <a href="index.html" class="navbar-brand text-decoration-none text-primary d-flex align-items-center">
                        <i class="fas fa-shopping-bag fa-2x me-2 text-warning"></i>
                        <h3 class="m-0 fw-bold">ShopKart <span class="text-warning">Pro</span></h3>
                    </a>
                </div>
                <div class="col-6 col-md-8 text-end">
                    <nav class="d-flex align-items-center gap-3 justify-content-end">
                        <a href="index.html" class="text-dark text-decoration-none small fw-bold d-none d-sm-inline-block">Home</a>
                        <a href="products.html" class="text-dark text-decoration-none small fw-bold d-none d-sm-inline-block">Products</a>
                        <a href="index.html" class="btn btn-outline-primary btn-sm px-3 rounded-pill fw-bold">Continue Shopping</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="container my-5">
        <h2 class="fw-bold mb-4"><i class="fas fa-shopping-cart text-primary"></i> Your Shopping Bag</h2>
        <div class="row g-4">
            <div class="col-lg-8" id="cart-items-wrapper"></div>
            <div class="col-lg-4" id="cart-summary-card">
                <div class="card p-4 shadow-sm bg-light">
                    <h4 class="fw-bold mb-3">Order Price Summary</h4>
                    <div class="d-between mb-2"><span>Subtotal:</span><span id="subtotal-val">$0.00</span></div>
                    <div class="d-between mb-2"><span>Estimated VAT/Tax (8%):</span><span id="tax-val">₹0</span></div> 
                    <hr>
                    <div class="d-between mb-4 fs-5 fw-bold text-primary"><span>Total Amount:</span><span id="total-val">₹0</span></div>
                    <a href="checkout.html" class="btn btn-primary w-100 py-2 fw-bold">Proceed To Secured Checkout</a>
                </div>
            </div>
        </div>
    </div>

    <script src="Assets/js/products.js"></script>
    <script src="Assets/js/cart.js"></script>
</body>
</html>
