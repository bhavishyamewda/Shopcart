<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secured Checkout | ShopKart Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="Assets/css/style.css">
</head>
<body>
    <div class="container my-5" style="max-width: 900px;">
        <h2 class="text-center fw-bold mb-4">Secured Check-Out Order Engine</h2>
        <div class="row g-4">
            <div class="col-md-7">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold mb-3">Shipping & Customer Information</h5>
                    <form onsubmit="handleCheckoutSubmit(event)">
                        <div class="mb-3"><label class="form-label">Full Name Identity</label><input type="text" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Email Address</label><input type="email" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Full Logistics Destination Address</label><textarea class="form-control" rows="3" required></textarea></div>
                        <div class="row"><div class="col-md-6 mb-3"><label class="form-label">Zip Code</label><input type="text" class="form-control" required></div><div class="col-md-6 mb-3"><label class="form-label">Country/Region</label><input type="text" class="form-control" required></div></div>
                        <button type="submit" class="btn btn-orange text-white fw-bold w-100 py-2 mt-2">Authorise and Place Final Order</button>
                    </form>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-4 shadow-sm bg-light">
                    <h5 class="fw-bold mb-3">Your Basket Cart Items</h5>
                    <div id="checkout-summary-wrapper"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="Assets/js/products.js"></script>
    <script src="Assets/js/cart.js"></script>
</body>
</html>
